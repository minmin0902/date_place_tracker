<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#FFF5E8" />

    <!-- PWA / home-screen (iOS + Android). Adding to home screen launches
         this as a standalone app with no browser chrome. -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="我们的餐桌" />

    <!-- Icons: favicon for the browser tab, app-icon.png for the home screen. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/app-icon.png" />

    <!-- Bunny Fonts 가 Google Fonts 의 1:1 프록시 — same URL shape, same
         family names. fonts.googleapis.com 이 중국 GFW 에 막혀서 VPN
         없이는 페이지 로드가 통째로 stuck 되던 거 우회. Bunny CDN 은
         China PoP 가 있어 본토에서 접속 가능. CSS + 글리프 파일 둘 다
         fonts.bunny.net 한 도메인에서 서빙되므로 gstatic preconnect 불필. -->
    <link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <!-- Korean body: Pretendard variable (latest, single file, all weights). -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css"
    />
    <!-- Chinese body + display: Noto Sans SC + Noto Serif SC (variable),
         Gowun Batang for Korean serif display, Quicksand for numeric /
         Latin accents. -->
    <link
      rel="stylesheet"
      href="https://fonts.bunny.net/css2?family=Noto+Sans+SC:wght@300..900&family=Noto+Serif+SC:wght@400..900&family=Gowun+Batang:wght@400;700&family=Quicksand:wght@500;600;700&display=swap"
    />
    <title>我们的餐桌</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
